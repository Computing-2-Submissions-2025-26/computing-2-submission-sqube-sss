<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Memory Sprint</title>
  <link rel="stylesheet" href="default.css">
  <script src="https://cdn.jsdelivr.net/npm/ramda@0.29.0/dist/ramda.min.js" defer></script>
  <script src="game.js" defer></script>
  <script src="main.js" defer></script>
</head>
<body class="theme-f1">

  <div id="theme-picker">
    <p class="theme-picker-heading">Pick your theme</p>
    <div>
      <button class="theme-btn active" data-theme="f1" aria-label="F1 Racing theme" title="F1 Racing">🏎️</button>
      <button class="theme-btn" data-theme="jungle" aria-label="Jungle Safari theme" title="Jungle Safari">🐒</button>
      <button class="theme-btn" data-theme="ocean" aria-label="Ocean Voyage theme" title="Ocean Voyage">🐬</button>
      <button class="theme-btn" data-theme="music" aria-label="Music Studio theme" title="Music Studio">🎸</button>
    </div>
    <p id="theme-label">Theme: F1 Racing</p>
  </div>

  <!-- main heading -->
  <h1>Memory Sprint</h1>

  <!-- shows whose turn it is -->
  <p id="status">Player 1's turn</p>

  <!-- player tracks with 10 squares each -->
  <section id="tracks">
    <div class="start-label-row">
      <span class="player-label" aria-hidden="true"></span>
      <span class="start-header">START</span>
    </div>
    <div class="track-row">
      <span class="player-label">Player 1</span>
      <div id="track1">
        <span class="start-pad" aria-label="Player 1 start"></span>
        <span class="square" data-position="1"></span>
        <span class="square" data-position="2"></span>
        <span class="square" data-position="3"></span>
        <span class="square" data-position="4"></span>
        <span class="square" data-position="5"></span>
        <span class="square" data-position="6"></span>
        <span class="square" data-position="7"></span>
        <span class="square" data-position="8"></span>
        <span class="square" data-position="9"></span>
        <span class="square" data-position="10"></span>
        <span class="finish-line" aria-label="Finish line"></span>
        <span id="chip1"></span>
      </div>
    </div>
    <div class="track-row">
      <span class="player-label">Player 2</span>
      <div id="track2">
        <span class="start-pad" aria-label="Player 2 start"></span>
        <span class="square" data-position="1"></span>
        <span class="square" data-position="2"></span>
        <span class="square" data-position="3"></span>
        <span class="square" data-position="4"></span>
        <span class="square" data-position="5"></span>
        <span class="square" data-position="6"></span>
        <span class="square" data-position="7"></span>
        <span class="square" data-position="8"></span>
        <span class="square" data-position="9"></span>
        <span class="square" data-position="10"></span>
        <span class="finish-line" aria-label="Finish line"></span>
        <span id="chip2"></span>
      </div>
    </div>
  </section>

  <!-- difficulty picker -->
  <section id="difficulty-area">
    <p>Choose difficulty (1-5):</p>
    <button class="difficulty-btn" data-difficulty="1">1</button>
    <button class="difficulty-btn" data-difficulty="2">2</button>
    <button class="difficulty-btn" data-difficulty="3">3</button>
    <button class="difficulty-btn" data-difficulty="4">4</button>
    <button class="difficulty-btn" data-difficulty="5">5</button>
  </section>

  <!-- countdown timer for memorise and perform phases -->
  <div id="timer-display" aria-live="polite"></div>

  <!-- shows the gesture sequence to memorise -->
  <div id="sequence-display"></div>

  <!-- feedback messages like Go!, Correct!, winner -->
  <p id="message"></p>

  <!-- key legend so players know which key is which gesture -->
  <footer>
    <p class="key-legend">
      Q=<span class="legend-emoji">✊</span> &nbsp;
      W=<span class="legend-emoji">🖐️</span> &nbsp;
      E=<span class="legend-emoji">👍</span> &nbsp;
      R=<span class="legend-emoji">✌️</span> &nbsp;
      T=<span class="legend-emoji">👆</span>
    </p>
  </footer>

</body>
</html>
